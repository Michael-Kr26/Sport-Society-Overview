<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <script src="auth-ui.js" defer></script>
    <script src="login.js" defer></script>
    <title>Sport Society - Inloggen</title>
</head>
<body>
    <header><h1>Sport Society Overview</h1><p>Inloggen</p></header>
    <nav><input type="checkbox" id="nav-toggle"><label for="nav-toggle" class="nav-toggle-label"><span></span></label><div class="nav-links"></div></nav>
    <main class="login-page">
        <section class="login-card">
            <div class="card-header"><p class="card-label">Account</p><h2>Inloggen</h2></div>
            <p class="login-intro">Log in met je gebruikersnaam en wachtwoord. Je beschikbare functies worden bepaald door je accountrol.</p>
            <form id="login-form" class="login-form">
                <label>Gebruikersnaam<input type="text" id="login-username" autocomplete="username" autocapitalize="none" spellcheck="false" required></label>
                <label>Wachtwoord<input type="password" id="login-password" autocomplete="current-password" required></label>
                <button type="submit" class="admin-button">Inloggen</button>
            </form>
            <p id="login-status" class="login-status" aria-live="polite"></p>
        </section>
    </main>
    <footer><p>&copy; 2026 Sport Society. All rights reserved. Build By Krijnen M&amp;B</p></footer>
</body>
</html>
